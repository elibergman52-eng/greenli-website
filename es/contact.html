<!DOCTYPE html>
<!-- TODO: translate -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulación de extracción — greenLi</title>
  <link rel="alternate" hreflang="en" href="../contact.html">
  <link rel="alternate" hreflang="es" href="./contact.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0A0C0B; --green: #3AE87A; --text: #F0F4F1; --muted: #8A9E8F; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); color: var(--text); }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
  
    /* ── Page texture: radial gradients + subtle noise (review #133/#58) ── */
    body::before { content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
      background:
        radial-gradient(ellipse 72% 55% at 12% 6%, rgba(58,232,122,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 62% 50% at 88% 94%, rgba(232,168,58,0.05) 0%, transparent 55%); }
    body::after { content:''; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.028;
      background-image:url("data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22 opacity=%221%22/%3E%3C/svg%3E"); background-size:220px 220px; }
    section[style*="background:var(--bg)"], section[style*="background: var(--bg)"] { background:transparent !important; }
  
    /* ── Ambient depth pass: hero blobs / glass photos / patterns / raised ── */
    @keyframes blobPulse {
      0%,100% { transform: scale(1) translate(0,0); opacity:0.5; }
      50%     { transform: scale(1.18) translate(-14px,12px); opacity:0.85; }
    }
    .hero-blobs { position:absolute; top:-120px; right:-100px; width:540px; height:540px; z-index:2; pointer-events:none;
      background: radial-gradient(circle at 55% 45%, rgba(127,255,184,0.16) 0%, transparent 62%); }
    .hero-blobs::before, .hero-blobs::after { content:''; position:absolute; border-radius:50%; filter:blur(72px); will-change:transform,opacity; }
    .hero-blobs::before { top:24px; right:110px; width:300px; height:300px; background:radial-gradient(circle, rgba(58,232,122,0.55) 0%, transparent 70%); animation:blobPulse 9s ease-in-out infinite; }
    .hero-blobs::after  { top:150px; right:-30px; width:250px; height:250px; background:radial-gradient(circle, rgba(232,168,58,0.42) 0%, transparent 70%); animation:blobPulse 11.5s ease-in-out infinite 1.6s; }

    .glass-photo { position:relative; background:rgba(255,255,255,0.045); backdrop-filter:blur(10px) saturate(120%); -webkit-backdrop-filter:blur(10px) saturate(120%);
      border:1px solid rgba(255,255,255,0.10); border-radius:14px; padding:10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 24px rgba(0,0,0,0.45), 0 24px 60px rgba(0,0,0,0.35), 0 0 50px rgba(58,232,122,0.06);
      transition:transform 0.3s ease, box-shadow 0.3s ease; }
    .glass-photo img { border-radius:8px; display:block; }

    .bg-dots, .bg-grid { position:relative; }
    .bg-dots > *, .bg-grid > * { position:relative; z-index:1; }
    .bg-dots::before, .bg-grid::before { content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
      -webkit-mask-image:radial-gradient(ellipse 85% 75% at 50% 45%, #000 30%, transparent 80%);
              mask-image:radial-gradient(ellipse 85% 75% at 50% 45%, #000 30%, transparent 80%); }
    .bg-dots::before { background-image:radial-gradient(rgba(240,244,241,0.05) 1px, transparent 1.6px); background-size:22px 22px; }
    .bg-grid::before { background-image:linear-gradient(rgba(240,244,241,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(240,244,241,0.025) 1px, transparent 1px); background-size:44px 44px; }

    .raised { box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 4px rgba(0,0,0,0.45), 0 16px 36px rgba(0,0,0,0.5), 0 0 60px rgba(58,232,122,0.05) !important; }
    .raised-amber { box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 4px rgba(0,0,0,0.45), 0 16px 36px rgba(0,0,0,0.5), 0 0 60px rgba(232,168,58,0.05) !important; }
    @media (prefers-reduced-motion: reduce) { .hero-blobs, .hero-blobs::before, .hero-blobs::after { animation:none !important; } }
  </style>
</head>
<body>
  <p style="font-family:'Inter',sans-serif; font-size:0.6875rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--green); margin-bottom:1rem;">greenLi · ES</p>
  <h1 style="font-family:'Space Grotesk',sans-serif; font-size:2rem; font-weight:700; letter-spacing:-0.03em; margin-bottom:1.25rem;">Versión en español próximamente.</h1>
  <p style="font-family:'Inter',sans-serif; font-size:1rem; color:var(--muted); line-height:1.75; max-width:40ch; margin-bottom:2rem;">El contenido en español estará disponible próximamente. Por ahora, puede consultar la versión en inglés.</p>
  <a href="../contact.html" style="font-family:'Inter',sans-serif; font-size:0.9375rem; font-weight:600; color:#0A0C0B; background:var(--green); padding:0.75rem 1.75rem; border-radius:4px; text-decoration:none;">View in English</a>
</body>
</html>
